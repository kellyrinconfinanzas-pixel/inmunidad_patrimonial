<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Inmunidad Patrimonial | Kelly-Finanzas</title>
    <!-- Tailwind CSS para el diseño rápido y responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Personalización de la barra de desplazamiento del chat */
        #chat-container::-webkit-scrollbar {
            width: 6px;
        }
        #chat-container::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 8px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 8px;
        }
        #chat-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* Animación suave de aparición para los mensajes */
        .fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans h-screen overflow-hidden flex flex-col">

    <!-- Header Móvil (solo visible en pantallas pequeñas) -->
    <div class="md:hidden bg-slate-900 text-white p-4 flex items-center justify-between shadow-md z-10">
        <h1 class="font-bold text-lg text-emerald-400">Inmunidad Patrimonial</h1>
        <img src="kelly.png" alt="Kelly Avatar" class="w-10 h-10 rounded-full border-2 border-emerald-500 object-cover" onerror="this.src='https://ui-avatars.com/api/?name=Kelly+Finanzas&background=0D8BCA&color=fff'">
    </div>

    <div class="flex-1 flex flex-col md:flex-row h-full overflow-hidden">
        
        <!-- Columna Izquierda: Imagen y Branding (Oculta en móviles, visible en Desktop) -->
        <div class="hidden md:flex md:w-5/12 lg:w-1/2 bg-slate-50 flex-col justify-center items-center relative border-r border-slate-200">
            <!-- Círculo decorativo de fondo -->
            <div class="absolute w-[400px] h-[400px] bg-emerald-100 rounded-full blur-3xl opacity-50 -z-0"></div>
            
            <div class="z-10 text-center flex flex-col items-center p-8">
                <img src="kelly.png" alt="Kelly-Finanzas" class="w-64 h-64 object-cover rounded-full shadow-2xl border-4 border-white mb-8 transition-transform duration-500 hover:scale-105" onerror="this.src='https://ui-avatars.com/api/?name=Kelly+Finanzas&background=0D8BCA&color=fff&size=256'">
                
                <h1 class="text-4xl lg:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">
                    Tu <span class="text-emerald-600">Inmunidad</span> Patrimonial
                </h1>
                <p class="text-lg text-slate-600 max-w-md">
                    Descubre cuánto tiempo puedes sostener tu estándar de vida sin depender de tu próximo ingreso.
                </p>
            </div>
        </div>

        <!-- Columna Derecha: Interfaz del Chatbot -->
        <div class="w-full md:w-7/12 lg:w-1/2 flex flex-col h-full bg-white relative">
            
            <!-- Cabecera del chat en Desktop -->
            <div class="hidden md:block border-b border-slate-100 p-6 bg-white shadow-sm z-10">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
                    <h2 class="font-bold text-slate-800 text-xl">Kelly-Bot Financiero</h2>
                </div>
                <p class="text-sm text-slate-500 mt-1">Sesión confidencial y cifrada.</p>
            </div>

            <!-- Área de mensajes -->
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-24 md:pb-32 bg-slate-50 md:bg-white">
                <!-- Los mensajes se inyectarán aquí vía JS -->
            </div>

            <!-- Área de Input del usuario (fijada al fondo) -->
            <div class="absolute bottom-0 left-0 w-full p-4 bg-white border-t border-slate-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                <form id="chat-form" class="max-w-2xl mx-auto relative flex items-center gap-2">
                    <input 
                        type="text" 
                        id="user-input" 
                        class="w-full bg-slate-100 border border-slate-300 text-slate-900 rounded-full py-4 px-6 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all"
                        placeholder="Escribe tu respuesta aquí..." 
                        autocomplete="off"
                        disabled
                    >
                    <button 
                        type="submit" 
                        id="send-btn"
                        class="bg-slate-900 hover:bg-emerald-600 text-white rounded-full p-4 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0"
                        disabled
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </form>
                <!-- Contenedor para botones de opciones (Sí/No) -->
                <div id="options-container" class="max-w-2xl mx-auto flex gap-3 mt-3 hidden justify-center">
                    <button class="option-btn bg-emerald-100 text-emerald-800 hover:bg-emerald-200 border border-emerald-300 rounded-full py-2 px-6 font-semibold transition-colors" data-value="1">Sí</button>
                    <button class="option-btn bg-slate-100 text-slate-700 hover:bg-slate-200 border border-slate-300 rounded-full py-2 px-6 font-semibold transition-colors" data-value="0">No</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DEL FLUJO DEL CHAT ---
        const chatFlow = [
            {
                id: 'intro_1',
                type: 'bot',
                text: '¡Hola! Si estás aquí, probablemente ganas bien. Tal vez inviertes. Seguramente te consideras responsable financieramente.',
                delay: 1000
            },
            {
                id: 'intro_2',
                type: 'bot',
                text: 'Pero hay una diferencia incómoda entre tener ingresos altos y tener inmunidad patrimonial. La mayoría confunde facturación con estructura.',
                delay: 2000
            },
            {
                id: 'q_nombre',
                type: 'question',
                text: 'Para empezar con este diagnóstico privado, ¿cuál es tu nombre o cómo te gustaría que te llame?',
                delay: 1500,
                inputType: 'text',
                field: 'nombre'
            },
            {
                id: 'q_email',
                type: 'question',
                text: 'Mucho gusto, {nombre}. ¿A qué correo electrónico enviaré tu reporte detallado al finalizar?',
                delay: 800,
                inputType: 'email',
                field: 'email'
            },
            {
                id: 'fase1_intro',
                type: 'bot',
                text: 'Excelente. Vamos a empezar con la FASE 1: Tu Oxígeno Financiero (<30 días). No te preocupes, los datos están seguros y no serás juzgado/a.',
                delay: 1000
            },
            {
                id: 'q_ahorros',
                type: 'question',
                text: '¿Cuánto dinero disponible (en tu moneda local o USD) tienes actualmente en Cuentas de Ahorro o Corriente?',
                delay: 1500,
                inputType: 'number',
                field: 'cuentas_ahorro'
            },
            {
                id: 'q_fondos',
                type: 'question',
                text: '¿Cuánto capital tienes en Fondos de inversión líquidos o CDTs a muy corto plazo?',
                delay: 1000,
                inputType: 'number',
                field: 'fondos_cdt'
            },
            {
                id: 'q_efectivo',
                type: 'question',
                text: 'Y por último en esta fase, ¿cuánto Efectivo disponible tienes a la mano?',
                delay: 1000,
                inputType: 'number',
                field: 'efectivo'
            },
            {
                id: 'fase2_intro',
                type: 'bot',
                text: 'Perfecto. Pasemos a la FASE 2: La Presión Mensual. Es decir, el costo real de tu estilo de vida.',
                delay: 1000
            },
            {
                id: 'q_gastos_fijos',
                type: 'question',
                text: '¿A cuánto ascienden tus Gastos Fijos Mensuales (vivienda, servicios, seguros, educación, etc.)?',
                delay: 1500,
                inputType: 'number',
                field: 'gastos_fijos'
            },
            {
                id: 'q_gastos_variables',
                type: 'question',
                text: 'Aproximadamente, ¿cuáles son tus Gastos Variables Mensuales (salidas, viajes, lujos)?',
                delay: 1000,
                inputType: 'number',
                field: 'gastos_variables'
            },
            {
                id: 'q_creditos',
                type: 'question',
                text: '¿Cuánto pagas mensualmente en Cuotas de Créditos o Hipotecas?',
                delay: 1000,
                inputType: 'number',
                field: 'cuotas_creditos'
            },
            {
                id: 'fase3_intro',
                type: 'bot',
                text: '¡Ya casi terminamos! Solo faltan 3 preguntas clave para evaluar tu Test de Blindaje de Legado.',
                delay: 1000
            },
            {
                id: 'q_legado_1',
                type: 'question',
                text: 'Responde honestamente: ¿Tu familia podría mantener exactamente su mismo estilo de vida si tú llegaras a faltar hoy?',
                delay: 1500,
                inputType: 'options', // Sí o No
                field: 'legado_estilo_vida'
            },
            {
                id: 'q_legado_2',
                type: 'question',
                text: '¿Tienes respaldo financiero garantizado ante una enfermedad catastrófica repentina?',
                delay: 1000,
                inputType: 'options',
                field: 'legado_enfermedad'
            },
            {
                id: 'q_legado_3',
                type: 'question',
                text: 'Finalmente, ¿Tus deudas están estructuradas para liquidarse solas en tu ausencia?',
                delay: 1000,
                inputType: 'options',
                field: 'legado_deudas'
            }
        ];

        // --- ESTADO DE LA APLICACIÓN ---
        let currentStepIndex = 0;
        const userData = {}; // Aquí guardaremos la información para mandarla a la API
        
        // Elementos del DOM
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const optionsContainer = document.getElementById('options-container');

        // --- FUNCIONES PRINCIPALES ---

        // Iniciar el flujo
        window.onload = () => {
            processNextStep();
        };

        async function processNextStep() {
            if (currentStepIndex >= chatFlow.length) {
                return finishChat();
            }

            const step = chatFlow[currentStepIndex];
            
            // Reemplazar variables en el texto (ej. {nombre})
            let textToDisplay = step.text;
            if (userData.nombre && textToDisplay.includes('{nombre}')) {
                textToDisplay = textToDisplay.replace('{nombre}', userData.nombre);
            }

            // Mostrar indicador de "escribiendo..."
            const typingId = showTypingIndicator();
            scrollToBottom();

            // Esperar el delay configurado
            await new Promise(resolve => setTimeout(resolve, step.delay));

            // Remover el "escribiendo..."
            removeTypingIndicator(typingId);

            // Mostrar el mensaje del bot
            addBotMessage(textToDisplay);
            scrollToBottom();

            if (step.type === 'bot') {
                // Si es solo un mensaje del bot, pasar al siguiente automáticamente
                currentStepIndex++;
                processNextStep();
            } else if (step.type === 'question') {
                // Habilitar el input correcto según el tipo de pregunta
                enableInput(step.inputType);
            }
        }

        function enableInput(type) {
            if (type === 'options') {
                // Mostrar botones Sí/No
                userInput.classList.add('hidden');
                sendBtn.classList.add('hidden');
                optionsContainer.classList.remove('hidden');
                optionsContainer.classList.add('flex');
                
                // Limpiar event listeners previos clonando los botones
                const newOptions = optionsContainer.cloneNode(true);
                optionsContainer.parentNode.replaceChild(newOptions, optionsContainer);
                
                // Re-asignar variable global y añadir listeners
                const updatedOptionsContainer = document.getElementById('options-container');
                const btns = updatedOptionsContainer.querySelectorAll('.option-btn');
                
                btns.forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        const val = this.getAttribute('data-value');
                        const text = this.innerText;
                        handleUserResponse(val, text); // Guardamos 1 o 0 (como en tu CSV) pero mostramos Sí/No
                    });
                });
            } else {
                // Mostrar input de texto/número/email
                document.getElementById('options-container').classList.add('hidden');
                document.getElementById('options-container').classList.remove('flex');
                
                userInput.classList.remove('hidden');
                sendBtn.classList.remove('hidden');
                
                userInput.type = type === 'number' ? 'number' : (type === 'email' ? 'email' : 'text');
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function disableInput() {
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            
            const opts = document.getElementById('options-container');
            opts.classList.add('hidden');
            opts.classList.remove('flex');
            
            userInput.classList.remove('hidden');
            sendBtn.classList.remove('hidden');
        }

        // --- MANEJO DE EVENTOS DE USUARIO ---
        
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const val = userInput.value.trim();
            if (!val) return;
            handleUserResponse(val, val);
        });

        function handleUserResponse(actualValue, displayText) {
            const currentStep = chatFlow[currentStepIndex];
            
            // Guardar dato en nuestro objeto JSON
            userData[currentStep.field] = actualValue;
            
            // Mostrar mensaje del usuario en UI
            addUserMessage(displayText);
            disableInput();
            scrollToBottom();

            // Avanzar al siguiente paso
            currentStepIndex++;
            processNextStep();
        }

        // --- FUNCIONES DE RENDERIZADO UI ---

        function addBotMessage(text) {
            const html = `
                <div class="flex items-start gap-4 w-full md:w-4/5 fade-in-up">
                    <div class="flex-shrink-0">
                        <img src="kelly.png" alt="Kelly" class="w-10 h-10 rounded-full border border-slate-200 object-cover" onerror="this.src='https://ui-avatars.com/api/?name=K&background=0D8BCA&color=fff'">
                    </div>
                    <div class="bg-white border border-slate-100 shadow-sm p-4 rounded-2xl rounded-tl-none text-slate-700 leading-relaxed">
                        <p>${text}</p>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', html);
        }

        function addUserMessage(text) {
            const html = `
                <div class="flex items-start gap-4 w-full md:w-4/5 ml-auto flex-row-reverse fade-in-up">
                    <div class="flex-shrink-0">
                        <div class="w-10 h-10 rounded-full bg-slate-200 border border-slate-300 flex items-center justify-center font-bold text-slate-500">
                            ${userData.nombre ? userData.nombre.charAt(0).toUpperCase() : 'Tú'}
                        </div>
                    </div>
                    <div class="bg-slate-900 text-white shadow-md p-4 rounded-2xl rounded-tr-none leading-relaxed">
                        <p>${text}</p>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', html);
        }

        function showTypingIndicator() {
            const id = 'typing-' + Date.now();
            const html = `
                <div id="${id}" class="flex items-start gap-4 w-4/5 fade-in-up">
                    <div class="flex-shrink-0">
                        <img src="kelly.png" alt="Kelly" class="w-10 h-10 rounded-full border border-slate-200 object-cover" onerror="this.src='https://ui-avatars.com/api/?name=K&background=0D8BCA&color=fff'">
                    </div>
                    <div class="bg-white border border-slate-100 shadow-sm p-4 rounded-2xl rounded-tl-none typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', html);
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // --- ENVÍO A LA API ---
        async function finishChat() {
            // Mostrar mensaje final de carga
            addBotMessage("¡Listo! Estoy estructurando tu información y calculando tu nivel de Inmunidad Patrimonial... Dame un segundo.");
            scrollToBottom();
            showTypingIndicator(); // Simulamos que la API está trabajando

            try {
                /*
                ===========================================================
                CÓDIGO REAL PARA VERCEL (Descomentar al implementar el API)
                ===========================================================
                
                const response = await fetch('/api/enviar-reporte-personal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                
                if(data.success) {
                    // Guardar el ID de la respuesta en local temporalmente para mostrar el reporte
                    sessionStorage.setItem('currentReportId', data.reportId);
                    window.location.href = 'r_inmunidad_patrimonial.html';
                } else {
                    throw new Error("Error en la respuesta de la API");
                }
                */

                // SIMULACIÓN DE LA API PARA ESTA ETAPA (Mock)
                setTimeout(() => {
                    console.log("Datos capturados para enviar a la API:", userData);
                    // Guardamos la data en localStorage SOLO TEMPORALMENTE para que el siguiente HTML (la vista previa) 
                    // pueda leerlo sin necesidad del backend activo en este momento.
                    localStorage.setItem('temp_inmunidad_data', JSON.stringify(userData));
                    
                    // Redirigir al siguiente paso
                    window.location.href = 'r_inmunidad_patrimonial.html';
                }, 3000);

            } catch (error) {
                console.error("Error al procesar:", error);
                addBotMessage("Hubo un pequeño problema de conexión al guardar tus datos. Por favor, intenta de nuevo.");
                removeTypingIndicator();
            }
        }
    </script>
</body>
</html>
