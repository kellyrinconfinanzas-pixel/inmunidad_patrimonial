<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Detallado | Kelly-Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // SEGURIDAD: Verificar sesión antes de cargar el DOM
        const token = sessionStorage.getItem('kelly_admin_token');
        if (!token || token === null || token === "") {
            window.location.href = "login.html";
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <nav class="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="kelly.png" class="w-10 h-10 object-contain" alt="Kelly" onerror="this.src='https://ui-avatars.com/api/?name=K&background=0D8BCA&color=fff'">
                <h1 class="font-bold">Ficha de Prospecto</h1>
            </div>
            <a href="portal.html" class="text-sm bg-slate-800 px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors">Volver al Portal</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8">
        <div id="content" class="space-y-6">
            <!-- Estado de Carga -->
            <div id="loading-view" class="bg-white p-12 text-center rounded-2xl border border-slate-200">
                <div class="animate-spin h-8 w-8 border-4 border-emerald-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p class="text-slate-500">Extrayendo radiografía financiera desde la nube...</p>
            </div>
        </div>
    </main>

    <script>
        // Obtener ID del prospecto desde la URL
        const urlParams = new URLSearchParams(window.location.search);
        const prospectoId = urlParams.get('id');

        window.onload = async () => {
            if (!prospectoId) {
                showError("No se ha proporcionado un ID de prospecto válido.");
                return;
            }

            try {
                // LLAMADA REAL A LA API PARA OBTENER LOS DATOS
                const response = await fetch('/api/obtener-prospectos');
                const result = await response.json();

                if (result.success && result.prospectos) {
                    // Buscar el prospecto específico por su ID
                    const prospecto = result.prospectos.find(p => p.id === prospectoId);
                    
                    if (prospecto) {
                        renderDetail(prospecto);
                    } else {
                        showError("El prospecto solicitado no existe en la base de datos.");
                    }
                } else {
                    throw new Error("Error al conectar con la base de datos.");
                }
            } catch (error) {
                console.error("Error cargando detalle:", error);
                showError("Hubo un error al cargar la información del servidor. Revisa tu conexión.");
            }
        };

        function showError(msg) {
            document.getElementById('content').innerHTML = `
                <div class="p-8 text-center bg-rose-50 text-rose-600 rounded-xl border border-rose-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                    <p class="font-bold">${msg}</p>
                    <a href="portal.html" class="inline-block mt-4 text-sm underline">Volver al portal</a>
                </div>
            `;
        }

        function renderDetail(d) {
            // Cálculos financieros
            const totalA = Number(d.cuentas_ahorro || 0) + Number(d.fondos_cdt || 0) + Number(d.efectivo || 0);
            const totalB = Number(d.gastos_fijos || 0) + Number(d.gastos_variables || 0) + Number(d.cuotas_creditos || 0);
            const meses = totalB > 0 ? (totalA / totalB).toFixed(1) : (totalA > 0 ? "+99" : "0.0");
            
            const legadoScore = Number(d.legado_estilo_vida || 0) + Number(d.legado_enfermedad || 0) + Number(d.legado_deudas || 0);
            
            // Color según inmunidad
            let colorClass = "text-emerald-500";
            if (parseFloat(meses) <= 3) colorClass = "text-rose-500";
            else if (parseFloat(meses) <= 12) colorClass = "text-amber-500";

            document.getElementById('content').innerHTML = `
                <div class="bg-white rounded-3xl shadow-lg border border-slate-200 overflow-hidden fade-in">
                    <!-- Cabecera de Identidad -->
                    <div class="bg-slate-900 p-8 md:p-12 text-white relative">
                        <div class="absolute top-0 right-0 p-4 opacity-10">
                            <svg class="w-32 h-32" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08s5.97 1.09 6 3.08c-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                        </div>
                        <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                            <div>
                                <span class="bg-emerald-500 text-[10px] uppercase font-bold px-2 py-1 rounded mb-2 inline-block">Prospecto Calificado</span>
                                <h2 class="text-4xl font-black">${d.nombre}</h2>
                                <p class="text-slate-400 font-medium">${d.email}</p>
                                <div class="flex items-center gap-2 mt-3 text-sm text-slate-300">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                    ${d.ciudad}, ${d.pais}
                                </div>
                            </div>
                            <div class="bg-white/10 backdrop-blur-md p-6 rounded-2xl text-center min-w-[160px] border border-white/10">
                                <span class="${colorClass} text-5xl font-black block">${meses}</span>
                                <p class="text-[10px] uppercase tracking-[0.2em] font-bold opacity-60">Meses de Inmunidad</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Grid de Detalles -->
                    <div class="p-8 md:p-10 grid grid-cols-1 md:grid-cols-3 gap-8">
                        
                        <!-- Columna 1: Datos Personales -->
                        <div class="space-y-6">
                            <h3 class="font-bold text-slate-400 uppercase text-xs tracking-widest flex items-center gap-2">
                                <div class="w-1 h-4 bg-emerald-500 rounded-full"></div>
                                Perfil Demográfico
                            </h3>
                            <ul class="space-y-4">
                                <li class="flex flex-col"><span class="text-xs text-slate-400">Género</span> <span class="font-bold text-slate-700">${d.genero || 'No especificado'}</span></li>
                                <li class="flex flex-col"><span class="text-xs text-slate-400">Edad</span> <span class="font-bold text-slate-700">${d.edad || 'N/A'} años</span></li>
                                <li class="flex flex-col"><span class="text-xs text-slate-400">Estado Civil</span> <span class="font-bold text-slate-700">${d.estado_civil || 'N/A'}</span></li>
                                <li class="flex flex-col"><span class="text-xs text-slate-400">Educación</span> <span class="font-bold text-slate-700">${d.educacion || 'N/A'}</span></li>
                                <li class="flex flex-col"><span class="text-xs text-slate-400">Ocupación</span> <span class="font-bold text-slate-700">${d.ocupacion || 'N/A'}</span></li>
                            </ul>
                        </div>

                        <!-- Columna 2: Cifras de Oxígeno -->
                        <div class="space-y-6 bg-slate-50 p-6 rounded-2xl">
                            <h3 class="font-bold text-blue-500 uppercase text-xs tracking-widest flex items-center gap-2">
                                <div class="w-1 h-4 bg-blue-500 rounded-full"></div>
                                Oxígeno (A)
                            </h3>
                            <ul class="space-y-4">
                                <li class="flex justify-between items-end border-b border-slate-200 pb-2">
                                    <span class="text-xs text-slate-400 italic">Cuentas</span> 
                                    <span class="font-bold">$${Number(d.cuentas_ahorro || 0).toLocaleString()}</span>
                                </li>
                                <li class="flex justify-between items-end border-b border-slate-200 pb-2">
                                    <span class="text-xs text-slate-400 italic">Fondos</span> 
                                    <span class="font-bold">$${Number(d.fondos_cdt || 0).toLocaleString()}</span>
                                </li>
                                <li class="flex justify-between items-end border-b border-slate-200 pb-2">
                                    <span class="text-xs text-slate-400 italic">Efectivo</span> 
                                    <span class="font-bold">$${Number(d.efectivo || 0).toLocaleString()}</span>
                                </li>
                                <li class="flex justify-between items-center pt-2">
                                    <span class="text-sm font-black text-slate-800">TOTAL</span> 
                                    <span class="text-lg font-black text-blue-600">$${totalA.toLocaleString()}</span>
                                </li>
                            </ul>
                        </div>

                        <!-- Columna 3: Cifras de Presión -->
                        <div class="space-y-6 bg-slate-50 p-6 rounded-2xl">
                            <h3 class="font-bold text-rose-500 uppercase text-xs tracking-widest flex items-center gap-2">
                                <div class="w-1 h-4 bg-rose-500 rounded-full"></div>
                                Presión (B)
                            </h3>
                            <ul class="space-y-4">
                                <li class="flex justify-between items-end border-b border-slate-200 pb-2">
                                    <span class="text-xs text-slate-400 italic">Fijos</span> 
                                    <span class="font-bold">$${Number(d.gastos_fijos || 0).toLocaleString()}</span>
                                </li>
                                <li class="flex justify-between items-end border-b border-slate-200 pb-2">
                                    <span class="text-xs text-slate-400 italic">Variables</span> 
                                    <span class="font-bold">$${Number(d.gastos_variables || 0).toLocaleString()}</span>
                                </li>
                                <li class="flex justify-between items-end border-b border-slate-200 pb-2">
                                    <span class="text-xs text-slate-400 italic">Créditos</span> 
                                    <span class="font-bold">$${Number(d.cuotas_creditos || 0).toLocaleString()}</span>
                                </li>
                                <li class="flex justify-between items-center pt-2">
                                    <span class="text-sm font-black text-slate-800">TOTAL</span> 
                                    <span class="text-lg font-black text-rose-600">$${totalB.toLocaleString()}</span>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <!-- Footer del Reporte: Legado y Otros -->
                    <div class="p-8 bg-slate-900 text-white flex flex-col md:flex-row justify-between items-center gap-6 border-t border-white/5">
                        <div class="flex items-center gap-6">
                            <div class="text-center">
                                <span class="block text-[10px] text-slate-400 uppercase font-bold mb-1">Legado Score</span>
                                <span class="text-2xl font-black ${legadoScore === 3 ? 'text-emerald-400' : 'text-amber-400'}">${legadoScore}/3</span>
                            </div>
                            <div class="w-px h-10 bg-white/10"></div>
                            <div>
                                <span class="block text-[10px] text-slate-400 uppercase font-bold mb-1">Tratamiento de Datos</span>
                                <span class="text-xs font-bold bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded">ACEPTADO</span>
                            </div>
                        </div>
                        
                        <div class="flex gap-4">
                            <button onclick="window.print()" class="bg-white/10 hover:bg-white/20 px-6 py-2 rounded-xl text-sm font-bold transition-all">Imprimir Ficha</button>
                            <a href="mailto:${d.email}" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-xl text-sm font-bold transition-all">Contactar por Email</a>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
